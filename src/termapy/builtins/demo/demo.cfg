{
    "config_version": 8,
    "title": "Demo Device",
    "border_color": "",
    "max_lines": 10000,
    "cmd_prefix": "/",
    "config_read_only": false,
    "os_cmd_enabled": false,
    "port": "DEMO",
    "baud_rate": 115200,
    "byte_size": 8,
    "parity": "N",
    "stop_bits": 1,
    "flow_control": "none",
    "encoding": "utf-8",
    "cmd_delay_ms": 0,
    "auto_connect": true,
    "auto_reconnect": false,
    "on_connect_cmd": "",
    "line_ending": "\r",
    "send_bare_enter": false,
    "echo_input": true,
    "echo_input_fmt": "[purple]> {cmd}[/]",
    "log_file": "",
    "show_timestamps": false,
    "show_line_endings": false,
    "show_traceback": true,
    "proto_results_template": "{name}_results.json",
    "max_grep_lines": 100,
    "custom_buttons": [
        {"enabled": true, "name": "Demo Help", "command": "/cls\\nHELP", "tooltip": "Clear screen and show device commands"},
        {"enabled": true, "name": "AT Demo", "command": "/cls\\n/run at_demo.run", "tooltip": "Run all AT commands with delays"},
        {"enabled": true, "name": "Info", "command": "/cfg.info", "tooltip": "Project info"},
        {"enabled": true, "name": "Probe", "command": "/probe", "tooltip": "Demo plugin: query the device"}
    ]
}
